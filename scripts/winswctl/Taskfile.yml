$schema: https://taskfile.dev/schema.json
version: "3"

silent: true

vars:
  SHIMS: shims

tasks:
  default:
    cmds:
      - task --list

  # --- Query ---

  list:
    desc: List all services
    cmds:
      - |
        count=$(powershell -NoProfile -Command "@(Get-ChildItem '{{.SHIMS}}/*.exe' -ErrorAction SilentlyContinue).Count")
        if [ "$count" -eq 0 ]; then
          echo "No services found."
          exit 0
        fi
        for f in "{{.SHIMS}}"/*.exe; do
          [ -f "$f" ] || continue
          powershell -NoProfile -Command "[System.IO.Path]::GetFileNameWithoutExtension('$f')"
        done

  status:*:
    desc: Show status of a service
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        exe="{{.SHIMS}}/{{.SVC}}.exe"
        if [ ! -f "$exe" ]; then
          echo "Service {{.SVC}} not found."
          exit 1
        fi
        printf "{{.SVC}}: "
        powershell -NoProfile -Command "& '$exe' status"

  status:
    desc: Show status of all services
    cmds:
      - |
        files=$(powershell -NoProfile -Command "Get-ChildItem '{{.SHIMS}}/*.exe' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName")
        if [ -z "$files" ]; then
          echo "No services found."
          exit 0
        fi
        for f in $files; do
          name=$(powershell -NoProfile -Command "[System.IO.Path]::GetFileNameWithoutExtension('$f')")
          printf "%s: " "$name"
          powershell -NoProfile -Command "& '$f' status"
        done

  # --- File layer: add / remove ---

  add:*:
    desc: Add a new service (hardlink winsw.exe + config template)
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        exe="{{.SHIMS}}/{{.SVC}}.exe"
        cfg="{{.SHIMS}}/{{.SVC}}.yml"
        if [ -f "$exe" ]; then
          echo "Service {{.SVC}} already exists, skipping"
          exit 0
        fi
        powershell -NoProfile -Command "Copy-Item 'winsw.exe' '$exe'"
        if [ ! -f "$cfg" ]; then
          powershell -NoProfile -Command "@('\$schema: https://raw.githubusercontent.com/winsw/winsw/v2/doc/yamlConfigurationSchema.json','id: {{.SVC}}','name: {{.SVC}}','description: {{.SVC}} service','delayedAutoStart: true','hideWindow: true','workingDirectory:','executable:','arguments:') | Set-Content '$cfg'"
          echo "Created config: $cfg"
        fi
        echo "Added service: {{.SVC}}"

  edit:*:
    desc: Edit service config with default editor
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        cfg="{{.SHIMS}}/{{.SVC}}.yml"
        if [ ! -f "$cfg" ]; then
          echo "Config {{.SVC}}.yml not found."
          exit 1
        fi
        if [ -n "$EDITOR" ]; then
          "$EDITOR" "$cfg"
        else
          notepad "$cfg"
        fi

  remove:*:
    desc: Remove service files (hardlink + config)
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        base="{{.SHIMS}}/{{.SVC}}"
        if [ ! -f "${base}.exe" ]; then
          echo "Service {{.SVC}} not found, nothing to remove"
          exit 0
        fi
        powershell -NoProfile -Command "Remove-Item -Force '${base}.exe','${base}.yml','${base}.xml' -ErrorAction SilentlyContinue" || true
        echo "Removed service: {{.SVC}}"

  reset:
    desc: Copy winsw.exe for services that have config but missing exe
    cmds:
      - |
        files=$(powershell -NoProfile -Command "Get-ChildItem '{{.SHIMS}}/*.yml','{{.SHIMS}}/*.xml' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty BaseName" | tr -d '\r')
        if [ -z "$files" ]; then
          echo "No services found."
          exit 0
        fi
        count=0
        for svc in $files; do
          if [ ! -f "{{.SHIMS}}/$svc.exe" ]; then
            powershell -NoProfile -Command "Copy-Item 'winsw.exe' '{{.SHIMS}}/$svc.exe'"
            echo "Restored {{.SHIMS}}/$svc.exe"
            count=$((count + 1))
          fi
        done
        if [ "$count" -eq 0 ]; then
          echo "All services already have exe, nothing to do"
        else
          echo "Restored $count service(s)"
        fi

  # --- Service registration: install / uninstall ---

  install:*:
    desc: Register service with Windows
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        exe="{{.SHIMS}}/{{.SVC}}.exe"
        if [ ! -f "$exe" ]; then
          echo "Service {{.SVC}} not found. Run 'winswctl add:{{.SVC}}' first."
          exit 1
        fi
        powershell -NoProfile -Command "& '$exe' install"

  uninstall:*:
    desc: Unregister service from Windows
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        exe="{{.SHIMS}}/{{.SVC}}.exe"
        if [ ! -f "$exe" ]; then
          echo "Service {{.SVC}} not found."
          exit 1
        fi
        powershell -NoProfile -Command "& '$exe' uninstall"

  # --- Service control: start / stop / restart ---

  start:*:
    desc: Start a service
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        exe="{{.SHIMS}}/{{.SVC}}.exe"
        if [ ! -f "$exe" ]; then
          echo "Service {{.SVC}} not found."
          exit 1
        fi
        powershell -NoProfile -Command "& '$exe' start"

  stop:*:
    desc: Stop a service
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        exe="{{.SHIMS}}/{{.SVC}}.exe"
        if [ ! -f "$exe" ]; then
          echo "Service {{.SVC}} not found."
          exit 1
        fi
        powershell -NoProfile -Command "& '$exe' stop"

  restart:*:
    desc: Restart a service
    silent: true
    vars:
      SVC: "{{index .MATCH 0}}"
    cmds:
      - |
        exe="{{.SHIMS}}/{{.SVC}}.exe"
        if [ ! -f "$exe" ]; then
          echo "Service {{.SVC}} not found."
          exit 1
        fi
        powershell -NoProfile -Command "& '$exe' restart"

  # --- Batch operations ---

  start:
    desc: Start all services
    cmds:
      - |
        files=$(powershell -NoProfile -Command "Get-ChildItem '{{.SHIMS}}/*.exe' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName")
        if [ -z "$files" ]; then
          echo "No services found."
          exit 0
        fi
        for f in $files; do
          powershell -NoProfile -Command "& '$f' start"
        done

  stop:
    desc: Stop all services
    cmds:
      - |
        files=$(powershell -NoProfile -Command "Get-ChildItem '{{.SHIMS}}/*.exe' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName")
        if [ -z "$files" ]; then
          echo "No services found."
          exit 0
        fi
        for f in $files; do
          powershell -NoProfile -Command "& '$f' stop"
        done

  restart:
    desc: Restart all services
    cmds:
      - |
        files=$(powershell -NoProfile -Command "Get-ChildItem '{{.SHIMS}}/*.exe' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName")
        if [ -z "$files" ]; then
          echo "No services found."
          exit 0
        fi
        for f in $files; do
          powershell -NoProfile -Command "& '$f' restart"
        done
